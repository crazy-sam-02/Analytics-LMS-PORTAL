name: Deploy VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/lms_key
          chmod 600 ~/.ssh/lms_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/lms_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
          set -e

          cd "${{ secrets.VPS_PATH }}"

          echo "Pulling latest code..."
          git fetch origin
          git reset --hard origin/main

          echo "Rebuilding Docker stack..."
          docker compose --env-file Backend/.env.production -f docker-compose.production.yml build
          docker compose --env-file Backend/.env.production -f docker-compose.production.yml up -d

          echo "Running migrations and indexes..."
          docker compose --env-file Backend/.env.production -f docker-compose.production.yml exec -T api npm run db:migrate:refresh-token-hashes
          docker compose --env-file Backend/.env.production -f docker-compose.production.yml exec -T api npm run db:migrate:violations
          docker compose --env-file Backend/.env.production -f docker-compose.production.yml exec -T api npm run db:create-indexes

          echo "Production readiness check..."
          docker compose --env-file Backend/.env.production -f docker-compose.production.yml exec -T api npm run prod:check

          echo "Public API check..."
          curl -fsS https://lms.analyticsedify.com/api/ready

          echo "Deployment complete."
          EOF
